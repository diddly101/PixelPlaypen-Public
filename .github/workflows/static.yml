                <p>When contacting support, please include:</p>
                <ul>
                    <li>Your iOS version</li>
                    <li>Your device model</li>
                    <li>A detailed description of the issue or question</li>
                    <li>Screenshots if applicable</li>
                </ul>
            </section>
        </div>
        
        <div class="footer">
