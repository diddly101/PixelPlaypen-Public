            <!-- SUPPORT SECTION -->
            <section id="support">
                <h2>📱 Support</h2>
                
                <h3>Welcome to PixelPlaypens!</h3>
                <p>PixelPlaypens is a creative toolkit for iOS that helps you transform your videos and photos with professional features:</p>
                <ul>
                    <li><strong>Video to GIF</strong> - Convert any video clip into animated GIFs</li>
                    <li><strong>Video Watermarking</strong> - Protect your videos with custom watermarks</li>
                    <li><strong>Photo Watermarking</strong> - Add watermarks to single or multiple photos</li>
                    <li><strong>Combine Videos</strong> - Merge multiple video clips into one</li>
                    <li><strong>Video Teaser</strong> - Create engaging preview clips</li>
                </ul>
                
                <h3>Getting Started</h3>
                <p>Simply select a feature from the main menu and follow the on-screen instructions. PixelPlaypens works directly with your Photo Library, making it easy to access your media and save your creations.</p>
                
                <h3>Share Extension</h3>
                <p>You can also use PixelPlaypens directly from the Photos app! Just tap the share button on any photo or video and select PixelPlaypens from the share menu.</p>
                
                <div class="contact-box">
                    <h3 style="color: white; margin-top: 0;">Need Help?</h3>
                    <p>If you're experiencing issues or have questions about PixelPlaypens, please reach out:</p>
                    <ul>
                        <li>Email: <a href="mailto:support@pixelplaypens.com">support@pixelplaypens.com</a></li>
                        <li>For bug reports or feature requests, please include your iOS version and device model</li>
                    </ul>
                </div>
                
                <h3>Frequently Asked Questions</h3>
                
                <div class="highlight">
                    <strong>Q: Where are my edited videos and photos saved?</strong><br>
                    A: All outputs are saved directly to your Photo Library, making them easy to find and share.
                </div>
                
                <div class="highlight">
                    <strong>Q: Does PixelPlaypens require an internet connection?</strong><br>
                    A: No! PixelPlaypens works completely offline. All processing happens on your device.
                </div>
                
                <div class="highlight">
                    <strong>Q: Why does the app need Photo Library access?</strong><br>
                    A: PixelPlaypens needs to read your photos and videos for editing, and save the finished results back to your library.
                </div>
                
                <div class="highlight">
                    <strong>Q: Are there any subscriptions or in-app purchases?</strong><br>
                    A: PixelPlaypens is a one-time purchase with no subscriptions. All features are included!
                </div>
            </section>
            
            <!-- PRIVACY POLICY SECTION -->
            <section id="privacy">
                <h2>🔒 Privacy Policy</h2>
                <p><strong>Last Updated:</strong> March 3, 2026</p>
                
                <div class="highlight">
                    <strong>TL;DR:</strong> PixelPlaypens doesn't collect, store, or share any of your personal data. Everything stays on your device. We respect your privacy completely.
                </div>
                
                <h3>Our Commitment to Privacy</h3>
                <p>At PixelPlaypens, your privacy is paramount. This app is designed with a privacy-first approach, ensuring that your photos, videos, and personal information remain yours alone.</p>
                
                <h3>Information We Do NOT Collect</h3>
                <p>PixelPlaypens does not collect, transmit, or store any of the following:</p>
                <ul>
                    <li>Personal information (name, email, phone number, etc.)</li>
                    <li>Photos or videos you edit</li>
                    <li>Usage analytics or statistics</li>
                    <li>Device identifiers</li>
                    <li>Location data</li>
                    <li>Any other personal or sensitive information</li>
                </ul>
                
                <h3>Photo Library Access</h3>
                <p>PixelPlaypens requests access to your Photo Library for the following purposes only:</p>
                <ul>
                    <li><strong>Reading:</strong> To allow you to select photos and videos for editing</li>
                    <li><strong>Writing:</strong> To save your finished GIFs, watermarked images, and edited videos back to your Photo Library</li>
                </ul>
                <p>All photo and video processing happens entirely on your device. Your media is never uploaded to any server or transmitted over the internet.</p>
                
                <h3>App Groups and Share Extension</h3>
                <p>PixelPlaypens uses Apple's App Groups technology to enable the share extension feature. This allows temporary file sharing between the main app and the share extension, but all data remains on your device and is automatically cleaned up after use.</p>
                
                <h3>Data Storage</h3>
                <p>All photo and video editing is performed locally on your device. PixelPlaypens does not use any cloud services, remote servers, or network connections for processing your media. Any temporary files created during editing are stored only on your device and are automatically cleaned up.</p>
                
                <h3>Third-Party Services</h3>
                <p>PixelPlaypens does not integrate with or use any third-party services, including:</p>
                <ul>
                    <li>No analytics services (e.g., Google Analytics, Firebase)</li>
                    <li>No advertising networks</li>
                    <li>No crash reporting services</li>
                    <li>No cloud storage services</li>
                    <li>No social media integrations</li>
                </ul>
                
                <h3>Network Activity</h3>
                <p>PixelPlaypens does not require an internet connection to function and makes no network requests. All features work completely offline.</p>
                
                <h3>Children's Privacy</h3>
                <p>PixelPlaypens does not knowingly collect information from anyone, including children under the age of 13. Since no data is collected at all, the app is safe for users of all ages.</p>
                
                <h3>Your Rights</h3>
                <p>Since PixelPlaypens does not collect any personal information, there is no data to access, modify, or delete. Your photos and videos remain under your complete control within your device's Photo Library.</p>
                
                <h3>Changes to This Privacy Policy</h3>
                <p>We may update this Privacy Policy from time to time. Any changes will be reflected on this page with an updated "Last Updated" date. We encourage you to review this policy periodically.</p>
                
                <h3>Compliance</h3>
                <p>PixelPlaypens is designed to comply with:</p>
                <ul>
                    <li>California Consumer Privacy Act (CCPA)</li>
                    <li>General Data Protection Regulation (GDPR)</li>
                    <li>Children's Online Privacy Protection Act (COPPA)</li>
                    <li>Apple App Store Privacy Guidelines</li>
                </ul>
                
                <h3>Contact Information</h3>
                <p>If you have any questions or concerns about this Privacy Policy, please contact us at:</p>
                <p><strong>Email:</strong> <a href="mailto:diddlyapplications@icloud.com">diddlyapplications@icloud.com</a></p>
            </section>
            
